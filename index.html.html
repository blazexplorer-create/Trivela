<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perchero PRO Final</title>

<style>
body {
  margin: 0;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.rack {
  position: relative;
  width: 1200px;
  height: 400px;
}

.rack::before {
  content: "";
  position: absolute;
  top: 20px;
  width: 100%;
  height: 6px;
  background: #333;
}

.shirt {
  position: absolute;
  width: 240px;   /* 🔥 DOBLE */
  height: 300px;  /* 🔥 DOBLE */
  top: 10px;
  cursor: pointer;
  perspective: 1000px;
  transition: transform 0.6s ease;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  backface-visibility: hidden;
  border-radius: 12px;
}

.front { transform: rotateY(180deg); }
.flipped .inner { transform: rotateY(180deg); }

</style>
</head>

<body>

<div class="rack" id="rack">

  <div class="shirt" data-id="0" onclick="moveShirt(this)">
    <div class="inner"><img class="back" src="C:\Users\juanm\Desktop\Trivela\PWEB\Equipaciones perchero\5. Haaland\Atras.png"><img class="front" src="C:\Users\juanm\Desktop\Trivela\PWEB\Equipaciones perchero\5. Haaland\Principal.png"></div>
  </div>

  <div class="shirt" data-id="1" onclick="moveShirt(this)">
    <div class="inner"><img class="back" src="C:\Users\juanm\Desktop\Trivela\PWEB\Equipaciones perchero\4. Mbappé\Atras.png"><img class="front" src="C:\Users\juanm\Desktop\Trivela\PWEB\Equipaciones perchero\4. Mbappé\Principal.png"></div>
  </div>

  <div class="shirt" data-id="2" onclick="moveShirt(this)">
    <div class="inner"><img class="back" src="C:\Users\juanm\Desktop\Trivela\PWEB\Equipaciones perchero\3. Lamine\Atras.png"><img class="front" src="C:\Users\juanm\Desktop\Trivela\PWEB\Equipaciones perchero\3. Lamine\Principal.png"></div>
  </div>

  <div class="shirt" data-id="3" onclick="moveShirt(this)">
    <div class="inner"><img class="back" src="C:\Users\juanm\Desktop\Trivela\PWEB\Equipaciones perchero\2. Ronaldo\Atras.png"><img class="front" src="C:\Users\juanm\Desktop\Trivela\PWEB\Equipaciones perchero\2. Ronaldo\Principal.png"></div>
  </div>

  <div class="shirt" data-id="4" onclick="moveShirt(this)">
    <div class="inner"><img class="back" src="C:\Users\juanm\Desktop\Trivela\PWEB\Equipaciones perchero\1. Messi\Atras.png"><img class="front" src="C:\Users\juanm\Desktop\Trivela\PWEB\Equipaciones perchero\1. Messi\Principal.png"></div>
  </div>

</div>

<script>
const shirts = document.querySelectorAll(".shirt");
const rack = document.getElementById("rack");

let rightSet = new Set();
let clickOrder = 1;

const spacing = 40;
const shirtWidth = 240;

function moveShirt(el) {

  const id = Number(el.dataset.id);

  if (!rightSet.has(id)) {

    el.style.zIndex = 1000;

    // 🔥 1. VA AL CENTRO
    el.style.transform = "translateX(400px)";

    // 🔥 2. ESPERA 1 SEGUNDO
    setTimeout(() => {

      // 🔥 3. HACE FLIP
      el.classList.add("flipped");

      el.dataset.order = clickOrder++;

      // 🔥 4. VA AL FINAL
      el.style.transform = "translateX(1100px)";

      setTimeout(() => {

        rightSet.add(id);
        updatePositions();

      }, 400);

    }, 1000);
  }

  else {

    const maxOrder = Math.max(...[...rightSet].map(id=>{
      return Number(document.querySelector(`[data-id='${id}']`).dataset.order);
    }));

    if (Number(el.dataset.order) === maxOrder && rightSet.size === shirts.length) {
      resetAll();
      return;
    }

    el.style.zIndex = 1000;
    el.style.transform = "translateX(400px)";

    setTimeout(() => {

      el.classList.remove("flipped");
      rightSet.delete(id);
      updatePositions();

    }, 600);
  }
}

/* POSICIONES */
function updatePositions() {

  const left = [];
  const right = [];

  shirts.forEach(el => {
    const id = Number(el.dataset.id);
    if (rightSet.has(id)) right.push(el);
    else left.push(el);
  });

  // IZQUIERDA
  left.sort((a,b)=>a.dataset.id - b.dataset.id);

  left.forEach((el, i) => {
    el.style.transform = `translateX(${i * 20}px)`;
    el.style.zIndex = i + 1;
  });

  // DERECHA AJUSTADA AL FINAL
  right.sort((a,b)=>a.dataset.id - b.dataset.id);

  const rackWidth = rack.offsetWidth;
  const totalWidth = (right.length - 1) * spacing;
  const startX = rackWidth - totalWidth - shirtWidth;

  right.forEach((el, i) => {
    const x = startX + (i * spacing);
    el.style.transform = `translateX(${x}px)`;
  });

  // z-index
  right.forEach(el => {
    el.style.zIndex = 200 + Number(el.dataset.order);
  });
}

/* RESET */
function resetAll() {

  rightSet.clear();
  clickOrder = 1;

  shirts.forEach((el, i) => {
    el.classList.remove("flipped");
    el.style.transform = `translateX(${i * 20}px)`;
    el.style.zIndex = i + 1;
  });
}

updatePositions();

</script>

</body>
</html>
